<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HoneyShield — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0d1117; color: #e6edf3; font-family:'Segoe UI',sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-red-600 flex items-center justify-center mb-4">
        <svg width="28" height="28" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">HoneyShield</h1>
      <p class="text-gray-500 text-sm mt-1">Attack Monitoring Dashboard</p>
    </div>

    <div style="background:#161b22;border:1px solid #30363d;" class="rounded-xl p-8">
      <h2 class="text-lg font-semibold mb-6 text-center">Sign in to continue</h2>
      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" class="space-y-4">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"/>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Username</label>
          <input name="username" type="text" autocomplete="username"
                 class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 transition"
                 placeholder="admin"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
          <input name="password" type="password" autocomplete="current-password"
                 class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 transition"
                 placeholder="••••••••"/>
        </div>
        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
          Sign In
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-600 mt-6">HoneyShield v1.0 &mdash; for research purposes only</p>
  </div>
</body>
</html>
