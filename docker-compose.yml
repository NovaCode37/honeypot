services:
  honeyshield:
    build: .
    container_name: honeyshield
    restart: unless-stopped
    ports:
      - "22:2222"
      - "80:8080"
      - "21:2121"
      - "5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - SSH_PORT=2222
      - HTTP_PORT=8080
      - FTP_PORT=2121
      - DASHBOARD_PORT=5000
      - BIND_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
